# ServiceMonitor for user-auth-service: Prometheus scrapes metrics from the metrics sidecar (port 9090).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-auth-service
  namespace: default
  labels:
    app: user-auth
spec:
  selector:
    matchLabels:
      app: user-auth
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scrapeTimeout: 10s
