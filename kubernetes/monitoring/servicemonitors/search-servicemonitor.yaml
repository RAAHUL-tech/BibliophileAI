# ServiceMonitor for search-service: Prometheus scrapes metrics from the metrics sidecar (port 9090).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: search-service
  namespace: default
  labels:
    app: search
spec:
  selector:
    matchLabels:
      app: search
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scrapeTimeout: 10s
